# Assisted by Claude Opus 4.6
apiVersion: uat.openshift.io/v1
kind: ClusterTest
metadata:
  name: ocp-uat
spec:
  nodes:
    - name: wrk-6
      componentValidation:
        sanity:
          gpuCount: 4
          gpuModel: NVIDIA-H100-80GB-HBM3
          nvlink: NV6
          nvlinkTopology: all-to-all
          pcieWidth: 16
          pcieGen: 5
          cpuModel: AMD EPYC 9754 128-Core Processor
          cpuCount: 192
          memory: 1512Gi
          numaNodes: 2
        ideal:
          cudaDriverVersion: "580.105.08"
          gpuPowerLimit: 700
          gpuPersistenceMode: true
          kernel: 5.14.0-570.106.1.el9_6.x86_64
          hugepages: 8000Mi
          cpuFreqGovernor: performance
          cpuIdleDriver: acpi_idle
          cpuIdleGovernor: menu
          # AMD acpi_idle C2 is equivalent to Intel C1E (low single-digit us wake-up)
          cpuCStatesEnabled: [POLL, C1, C2]
          transparentHugepages: madvise

    - name: wrk-4
      componentValidation:
        sanity:
          gpuCount: 2
          gpuModel: NVIDIA-A100-SXM4-40GB
          nvlink: NV4
          nvlinkTopology: all-to-all
          pcieWidth: 16
          pcieGen: 4
          cpuModel: Intel(R) Xeon(R) Platinum 8358 CPU @ 2.60GHz
          cpuCount: 128
          memory: 1007Gi
          numaNodes: 2
        ideal:
          cudaDriverVersion: "580.105.08"
          gpuPowerLimit: 400
          gpuPersistenceMode: true
          kernel: 5.14.0-570.106.1.el9_6.x86_64
          hugepages: 8000Mi
          cpuFreqGovernor: performance
          cpuIdleDriver: intel_idle
          cpuIdleGovernor: menu
          cpuCStatesEnabled: [POLL, C1, C1E]
          transparentHugepages: madvise


  namespace: coldpress-project

  storage:
    pvc: coldpress-project-storage
    basePath: uat/results

  timeout: 2h
